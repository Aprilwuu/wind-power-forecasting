pipeline: transformer_qr
protocol: track2_lofo_time_val

paths:
  featured_dir: data/featured
  reports_dir: reports/experiments

data:
  path: data/processed/gefcom_wind_all_zones.csv
  target_col: target
  zone_col: zone_id
  time_col: datetime

# Track2 split settings (LOFO + time-based validation inside each fold)
split:
  type: lofo
  held_out_group: null      # runner will fill this per fold (recommended)
  val_days: 30
  min_train: 1000
  group_col: zone_id        # in your code, LOFO typically uses zone_id

seq:
  lookback: 168
  horizon: 1
  feature_cols: null
  include_target_as_input: true
  add_missing_mask: true

keep_zone: true
zone_emb_dim: 8

# Transformer backbone (match beta / fairness)
d_model: 64
nhead: 4
num_layers: 2
dim_feedforward: 128
dropout: 0.1

# Quantile setup
probabilistic:
  quantiles: [0.05, 0.5, 0.95]

compute_interval: true
interval_coverage: 0.9

# Training (ForecastBasePipeline reads training.*)
training:
  batch_size: 256
  max_epochs: 50
  patience: 8
  lr: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  device: cuda
  num_workers: 0
  pin_memory: true
  val_every: 1

# loss name (ForecastBasePipeline uses train_loss_name or loss_name)
train_loss_name: pinball
huber_delta: 1.0
pipeline: transformer_det
protocol: track2_lofo_time_val

data:
  path: data/processed/gefcom_wind_all_zones.csv

split:
  type: lofo
  held_out_group: null      # runner 会填 3
  val_days: 30
  min_train: 1000
  group_col: zone_id

seq:
  lookback: 168
  horizon: 1
  feature_cols: null
  include_target_as_input: true
  add_missing_mask: true

keep_zone: false
zone_emb_dim: 8   # keep_zone=false 时无影响

# transformer hparams (顶层)
d_model: 64
nhead: 4
num_layers: 2
dim_feedforward: 128
dropout: 0.1

use_vae: true
vae_mode: cache
vae_ckg_dir: reports/vae/heldout_3/seed_42/artifacts

training:
  device: cuda
  batch_size: 256
  max_epochs: 10
  patience: 3
  lr: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  num_workers: 0
  pin_memory: true
  val_every: 1

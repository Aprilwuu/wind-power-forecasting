pipeline: vae
protocol: track1_temporal

data:
  path: data/processed/gefcom_wind_all_zones.csv

cols:
  target_col: target
  zone_col: zone_id
  time_col: datetime

split:
  train_cut: "2013-07-01 00:00:00"
  val_cut:   "2013-10-01 00:00:00"

seq:
  lookback: 168
  horizon: 1
  feature_cols: null
  include_target_as_input: true
  add_missing_mask: true

# Track1: use zone-embedding
keep_zone: true

vae:
  hidden_dim: 64
  latent_dim: 16

vae_beta_kl: 1.0

training:
  batch_size: 256
  max_epochs: 30
  patience: 6
  lr: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  device: cuda
  num_workers: 0
  pin_memory: true

pipeline: transformer_beta
protocol: track1_temporal

paths:
  featured_dir: data/featured
  reports_dir: reports/experiments

data:
  path: data/processed/gefcom_wind_all_zones.csv

split:
  type: temporal
  train_cut: "2013-07-01"
  val_cut: "2013-10-01"
  group_col: null

seq:
  lookback: 168
  horizon: 1
  feature_cols: null
  include_target_as_input: true
  add_missing_mask: true

held_out_group: null
val_days: null
min_train: null

keep_zone: true
zone_emb_dim: 8

# ✅ small architecture
d_model: 64
nhead: 4
num_layers: 1
dim_feedforward: 128
dropout: 0.1

# Beta 不用 VAE（除非你后面要加）
use_vae: false
freeze_vae: true
use_sample_z: false
vae_ckpt_path: null
vae_latent_dim: null
vae: {}

training:
  batch_size: 256
  max_epochs: 50
  patience: 8
  lr: 0.0003   # ✅ tuned best
  weight_decay: 0.0
  grad_clip: 1.0
  device: cuda
  num_workers: 2  
  pin_memory: true
  val_every: 1

model:
  train_loss:
    name: mse  
    huber_delta: 1.0

train_loss_name: mse
huber_delta: 1.0


compute_interval: true
interval_coverage: 0.9

interval_on_val: false

prob:
  use_mc_dropout: false
  mc_runs: 0
  mc_quantiles: []
# configs/transformer_det_track2_lofo.yaml
pipeline: transformer_det
protocol: track2_lofo_time_val

paths:
  featured_dir: data/featured
  reports_dir: reports/experiments

data:
  path: data/processed/gefcom_wind_all_zones.csv

# --------------------
# Split (Track2): LOFO + inner time validation
# NOTE:
#   - held_out_group must be filled by runner each run.
#   - group_col is used to define the LOFO group column (usually zone_id).
# --------------------
split:
  type: lofo
  held_out_group: null     # runner will fill (e.g., 3)
  val_days: 30
  min_train: 1000
  group_col: zone_id

seq:
  lookback: 168
  horizon: 1
  feature_cols: null
  include_target_as_input: true
  add_missing_mask: true

# Track2: unknown zone at test time -> do NOT use zone embedding
keep_zone: false
zone_emb_dim: 8            # no effect when keep_zone=false

# ---- TransformerDetPipeline reads these from top-level cfg ----
d_model: 64
nhead: 4
num_layers: 2
dim_feedforward: 128
dropout: 0.1


training:
  batch_size: 256
  max_epochs: 50
  patience: 8
  lr: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  device: cuda
  num_workers: 0
  pin_memory: true
  val_every: 1

# Loss fields are read by ForecastBasePipeline via train_loss_name/huber_delta (top-level keys).
# We also keep a TCN-like block for alignment with other configs.
model:
  train_loss:
    name: mse
    huber_delta: 1.0

train_loss_name: mse
huber_delta: 1.0

prob:
  use_mc_dropout: false
  mc_runs: 0
  mc_quantiles: []

experiment: lgbm_small_grid_search

runtime:
  data_path: E:\Projects\wind-power-forecasting\data\processed\gefcom_wind_all_zones.csv
  out_dir: E:\Projects\wind-power-forecasting\data\featured\lgbm_grid_search
  train_cut: "2013-07-01"
  val_cut: "2013-10-01"

features:
  lags: [1, 2, 3, 6, 12, 24, 48, 72, 96, 120, 144, 168]
  rolling_windows: [6, 24, 72, 168]

data:
  target_col: target
  zone_col: zone_id
  time_col: datetime
  keep_zone: true

seeds: [42]

grid:
  learning_rate: [0.03, 0.05, 0.1]
  num_leaves: [31, 63, 127]
  min_data_in_leaf: [20, 50, 100]

fixed_params:
  objective: regression
  metric: [rmse, mae]
  n_estimators: 2000
  feature_fraction: 0.9
  bagging_fraction: 0.9
  bagging_freq: 1
  lambda_l2: 1.0
  verbosity: -1
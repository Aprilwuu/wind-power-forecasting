pipeline: beta_transformer
protocol: track1_temporal

paths:
  featured_dir: data/featured
  reports_dir: reports/experiments

data:
  path: data/processed/gefcom_wind_all_zones.csv

split:
  type: temporal
  train_cut: "2013-07-01"
  val_cut: "2013-10-01"
  group_col: null

seq:
  lookback: 168
  horizon: 1
  feature_cols: null
  include_target_as_input: true
  add_missing_mask: true

keep_zone: true
zone_emb_dim: 8

# ---- Beta Transformer hparams (your pipeline reads them top-level) ----
d_model: 64
nhead: 4
num_layers: 2
dim_feedforward: 128
dropout: 0.1
num_components: 1

# Beta parameterization controls (you already added these to BetaTimeSeriesTransformer.__init__)
eps: 1e-4
kappa_max: null

# y is already normalized to [0,1] in your data pipeline
y_min: 0.0
y_max: 1.0

compute_interval: true
interval_coverage: 0.9
q_iter: 60


# Optional VAE switch
use_vae: false
freeze_vae: true
use_sample_z: false
vae_ckpt_path: null
vae_latent_dim: null
vae: {}  # SequenceVAE init kwargs if use_vae=true

training:
  batch_size: 256
  max_epochs: 50
  patience: 8
  lr: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  device: cuda
  num_workers: 0
  pin_memory: true
  val_every: 1

# For beta pipeline, loss is beta_nll (your compute_loss ignores loss_fn anyway),
# but keep this block for alignment/documentation.
model:
  train_loss:
    name: beta_nll
    huber_delta: null

train_loss_name: mse        # unused for beta_nll, kept for compatibility
huber_delta: 1.0            # unused

prob:
  use_mc_dropout: false
  mc_runs: 0
  mc_quantiles: []

pipeline: transformer_qr
protocol: track2_lofo_time_val

paths:
  featured_dir: data/featured
  reports_dir: reports/experiments

data:
  path: data/processed/gefcom_wind_all_zones.csv
  target_col: target
  zone_col: zone_id
  time_col: datetime

split:
  type: lofo
  held_out_group: 1          
  val_days: 30
  min_train: 1000
  group_col: zone_id

seq:
  lookback: 168
  horizon: 1
  feature_cols: null
  include_target_as_input: true
  add_missing_mask: true

keep_zone: true
zone_emb_dim: 8

d_model: 64
nhead: 4
num_layers: 2
dim_feedforward: 128
dropout: 0.1

probabilistic:
  quantiles: [0.05, 0.5, 0.95]

compute_interval: true
interval_coverage: 0.9

training:
  batch_size: 256
  max_epochs: 50
  patience: 8
  lr: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  device: cuda
  num_workers: 0
  pin_memory: true
  val_every: 1

train_loss_name: pinball